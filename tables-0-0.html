<div id="tables" class="section">
  <h1>Tables de multiplication</h1>
  <div class="tables">
    <script>
      for(let t=0;t<=10;t++){
        document.write("<div class='card'><b>Table de "+t+"</b><br>");
        for(let i=1;i<=10;i++){
          document.write(t+" x "+i+" = "+(t*i)+"<br>");
        }
        document.write("</div>");
      }
    </script>
  </div>
</div>
